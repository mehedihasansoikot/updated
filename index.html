<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Portal</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2b003d,#ff4fd8);
    font-family:Arial, sans-serif;
}

.card{
    background:rgba(255,255,255,0.96);
    width:90%;
    max-width:500px;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 35px rgba(0,0,0,0.35);
}

h1,h2,h3{
    color:#111;
    margin-bottom:15px;
}

input{
    width:85%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    padding:12px 18px;
    margin:8px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#7a00ff;
    color:white;
    font-size:16px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
    background:#9900ff;
}

.voteBtn{
    width:85%;
}

.thankyou{
    font-size:30px;
    font-weight:bold;
    letter-spacing:2px;
}

.small{
    font-size:14px;
    color:#555;
}
</style>
</head>

<body>

<div class="card" id="app">

<h2>Election Portal</h2>

<input id="roll" type="number" placeholder="Enter Roll Number (121-150)">
<br>

<input id="code" type="password" placeholder="Enter Secret Code">
<br>

<button onclick="start()">Continue</button>

<p class="small">One vote per roll number</p>

</div>

<script>

// SUPABASE SETTINGS
const supabaseUrl = "https://mvngflggbixwsedtckck.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12bmdmbGdnYml4d3NlZHRja2NrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODU5MjQsImV4cCI6MjA5NjY2MTkyNH0.dunDPjdHiN5T-DSJGJZ1DiDuBZvfIYz7agoVs_R81-4";

const db = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);

let currentRoll = null;

// LOGIN
async function start(){

    const roll = document.getElementById("roll").value;
    const code = document.getElementById("code").value;

    if(!roll){
        alert("Enter roll number");
        return;
    }

    if(roll < 121 || roll > 150){
        alert("Roll must be between 121 and 150");
        return;
    }

    const { data, error } = await db
        .from("votes")
        .select("*")
        .eq("roll", roll)
        .single();

    if(error){
        console.error(error);
        alert("Database error. Open F12 Console.");
        return;
    }

    if(!data){
        alert("Roll not found");
        return;
    }

    if(data.code !== code){
        alert("Wrong secret code");
        return;
    }

    if(data.choice && data.choice !== ""){
        document.getElementById("app").innerHTML =
        "<h2>You have already voted.</h2>";
        return;
    }

    currentRoll = roll;
    showQuestion();
}

// QUESTION PAGE
function showQuestion(){

    document.getElementById("app").innerHTML = `

        <h2>What do you want for the betterment of the current system?</h2>

        <button class="voteBtn"
        onclick="vote('ELECTION')">
        I want ELECTION
        </button>

        <br>

        <button class="voteBtn"
        onclick="vote('NO ELECTION')">
        I Do not want ELECTION
        </button>

    `;
}

// SAVE VOTE
async function vote(choice){

    const { error } = await db
        .from("votes")
        .update({
            choice: choice
        })
        .eq("roll", currentRoll);

    if(error){
        console.error(error);
        alert("Vote could not be saved.");
        return;
    }

    document.getElementById("app").innerHTML = `
        <div class="thankyou">
            THANK YOU FOR YOUR PARTICIPATION
        </div>
    `;
}

</script>

</body>
</html>
